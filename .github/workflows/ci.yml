name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET core, tools, and WPF
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore MacroHID.sln

      - name: Build
        run: dotnet build MacroHID.sln --configuration Release --no-restore

      - name: Run core tests
        run: dotnet run --project tests\MacroHid.Core.Tests\MacroHid.Core.Tests.csproj --configuration Release --no-build

      - name: Build native playback engine
        shell: pwsh
        run: |
          # src\native\MacroHid.NativePlayback\MacroHid.NativePlayback.vcxproj
          .\scripts\Build-NativePlayback.ps1 -Configuration Release

      - name: Run latency probe smoke test
        run: dotnet run --project src\tools\LatencyProbe\LatencyProbe.csproj --configuration Release --no-build -- --iterations 250 --interval-us 1000

      - name: Run macro runner dry-run smoke test
        run: dotnet run --project src\tools\MacroRunner\MacroRunner.csproj --configuration Release --no-build -- --macro samples\baseline.mcrx --pixels match

      - name: Publish MacroStudio
        run: dotnet publish src\ui\MacroStudio\MacroStudio.csproj --configuration Release --runtime win-x64 --self-contained false --output artifacts\MacroStudio

      - name: Publish LatencyProbe
        run: dotnet publish src\tools\LatencyProbe\LatencyProbe.csproj --configuration Release --runtime win-x64 --self-contained false --output artifacts\LatencyProbe

      - name: Publish MacroRunner
        run: dotnet publish src\tools\MacroRunner\MacroRunner.csproj --configuration Release --runtime win-x64 --self-contained false --output artifacts\MacroRunner

      - name: Copy native playback engine
        shell: pwsh
        run: |
          $dll = 'src\native\MacroHid.NativePlayback\x64\Release\MacroHid.NativePlayback.dll'
          foreach ($component in @('MacroStudio', 'MacroRunner', 'LatencyProbe')) {
            Copy-Item -LiteralPath $dll -Destination (Join-Path 'artifacts' "$component\MacroHid.NativePlayback.dll") -Force
          }

      - name: Upload .NET artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacroHID-dotnet-${{ github.sha }}
          path: artifacts

  installer:
    name: Inno Setup installer
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          function Find-Iscc {
            $candidates = @(
              (Join-Path $env:LOCALAPPDATA 'Programs\Inno Setup 6\ISCC.exe'),
              (Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'),
              (Join-Path $env:ProgramFiles 'Inno Setup 6\ISCC.exe')
            )
            $pathCommand = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($pathCommand) {
              $candidates += $pathCommand.Source
            }
            foreach ($candidate in $candidates) {
              if ($candidate -and (Test-Path $candidate)) {
                return (Resolve-Path $candidate).Path
              }
            }
            return $null
          }

          $iscc = Find-Iscc
          if (-not $iscc) {
            winget install --id JRSoftware.InnoSetup --exact --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity
          }

          $iscc = Find-Iscc
          if (-not $iscc) {
            throw 'Inno Setup compiler ISCC.exe was not found after installation.'
          }
          Write-Host "ISCC=$iscc"

      - name: Build installer
        shell: pwsh
        run: .\scripts\Build-Installer.ps1 -Configuration Release

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroHID-installer-${{ github.sha }}
          path: artifacts\installer\MacroHID-Setup-x64.exe
